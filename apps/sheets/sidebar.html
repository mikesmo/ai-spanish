<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        font-family: sans-serif;
        font-size: 13px;
        margin: 10px;
        color: #202124;
      }
      .help {
        margin-bottom: 12px;
        line-height: 1.4;
      }
      label {
        display: block;
        margin-top: 8px;
        font-weight: 500;
      }
      input[type="email"],
      input[type="password"] {
        box-sizing: border-box;
        width: 100%;
        margin-top: 4px;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #dadce0;
        border-radius: 4px;
      }
      button {
        margin-top: 12px;
        padding: 6px 12px;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }
      #status {
        margin-top: 10px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #status.err {
        color: #c5221f;
      }
      #status.ok {
        color: #137333;
      }
    </style>
  </head>
  <body>
    <div class="help">
      Sign in with the same <strong>email and password</strong> you use in the AI Spanish web app. Lesson 1 phrases are loaded from the authenticated transcript API into this sheet.
    </div>
    <form id="loadForm" action="javascript:void(0)">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        autocomplete="username"
        required
      />
      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        required
      />
      <button type="submit" id="loadBtn">Load lesson from web</button>
    </form>
    <div id="status" aria-live="polite"></div>

    <script>
      function setStatus(text, variant) {
        var el = document.getElementById("status");
        el.textContent = text;
        el.className = variant || "";
      }

      function setLoading(isLoading) {
        var btn = document.getElementById("loadBtn");
        btn.disabled = isLoading;
      }

      document.getElementById("loadForm").addEventListener("submit", function (ev) {
        ev.preventDefault();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        if (!email) {
          setStatus("Enter your email.", "err");
          return;
        }
        setStatus("Loading…");
        setLoading(true);
        google.script.run
          .withSuccessHandler(function (result) {
            setLoading(false);
            if (result && result.ok) {
              setStatus(result.message || "Done.", "ok");
            } else {
              setStatus((result && result.message) || "Something went wrong.", "err");
            }
          })
          .withFailureHandler(function (err) {
            setLoading(false);
            setStatus(err.message || String(err), "err");
          })
          .populateLessonFromJson(email, password);
      });
    </script>
  </body>
</html>
