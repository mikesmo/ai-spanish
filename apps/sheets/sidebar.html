<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        font-family: sans-serif;
        font-size: 13px;
        margin: 10px;
        color: #202124;
      }
      .preview {
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid #dadce0;
      }
      .preview h2 {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 600;
        color: #5f6368;
      }
      .preview .row-meta {
        margin-bottom: 10px;
        font-size: 12px;
        color: #5f6368;
      }
      .preview-field {
        margin-top: 10px;
      }
      .preview-field dt {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        color: #5f6368;
      }
      .preview-field dd {
        margin: 4px 0 0;
        padding: 0;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .preview-actions {
        margin-top: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .preview-play,
      .preview-record {
        margin-top: 0;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        min-width: 7.5em;
        box-sizing: border-box;
      }
      .preview-play:disabled,
      .preview-record:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }
      .preview-play .play-spin {
        display: inline-block;
        width: 12px;
        height: 12px;
        flex-shrink: 0;
        border: 2px solid #dadce0;
        border-top-color: #1a73e8;
        border-radius: 50%;
        animation: playSpin 0.65s linear infinite;
        vertical-align: middle;
      }
      @keyframes playSpin {
        to {
          transform: rotate(360deg);
        }
      }
      .help {
        margin-bottom: 12px;
        line-height: 1.4;
      }
      .auth-actions button {
        margin-right: 8px;
      }
      label {
        display: block;
        margin-top: 8px;
        font-weight: 500;
      }
      input[type="email"],
      input[type="password"] {
        box-sizing: border-box;
        width: 100%;
        margin-top: 4px;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #dadce0;
        border-radius: 4px;
      }
      button {
        margin-top: 12px;
        padding: 6px 12px;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }
      #status {
        margin-top: 10px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #status.err {
        color: #c5221f;
      }
      #status.ok {
        color: #137333;
      }
      .preview-heard {
        display: none;
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.4;
        color: #c5221f;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .save-progress {
        margin-top: 14px;
        font-size: 12px;
        line-height: 1.45;
        color: #5f6368;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .save-progress.save-progress--hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <section
      class="preview"
      id="previewSection"
      style="display: none"
      aria-live="polite"
      aria-atomic="true"
    >
      <h2>Selected row</h2>
      <div class="row-meta" id="previewRowMeta">Row —</div>
      <dl>
        <div class="preview-field">
          <dt>First Intro</dt>
          <dd id="previewFirstIntro">—</dd>
          <div
            class="preview-heard"
            id="previewHeardFirstIntro"
            style="display: none"
            aria-live="polite"
          ></div>
          <div class="preview-actions">
            <button
              type="button"
              class="preview-play"
              data-segment="first-intro"
              aria-label="Play First Intro audio"
              disabled
            >
              Play
            </button>
            <button
              type="button"
              class="preview-record"
              data-segment="first-intro"
              aria-label="Save First Intro audio from cell text"
              disabled
            >
              Save
            </button>
          </div>
        </div>
        <div class="preview-field">
          <dt>Second Intro</dt>
          <dd id="previewSecondIntro">—</dd>
          <div
            class="preview-heard"
            id="previewHeardSecondIntro"
            style="display: none"
            aria-live="polite"
          ></div>
          <div class="preview-actions">
            <button
              type="button"
              class="preview-play"
              data-segment="second-intro"
              aria-label="Play Second Intro audio"
              disabled
            >
              Play
            </button>
            <button
              type="button"
              class="preview-record"
              data-segment="second-intro"
              aria-label="Save Second Intro audio from cell text"
              disabled
            >
              Save
            </button>
          </div>
        </div>
        <div class="preview-field">
          <dt>Answer</dt>
          <dd id="previewAnswer">—</dd>
          <div
            class="preview-heard"
            id="previewHeardAnswer"
            style="display: none"
            aria-live="polite"
          ></div>
          <div class="preview-actions">
            <button
              type="button"
              class="preview-play"
              data-segment="answer"
              aria-label="Play Answer audio"
              disabled
            >
              Play
            </button>
            <button
              type="button"
              class="preview-record"
              data-segment="answer"
              aria-label="Save Answer audio from cell text"
              disabled
            >
              Save
            </button>
          </div>
        </div>
      </dl>
      <div
        id="saveProgressStatus"
        class="save-progress save-progress--hidden"
        aria-live="polite"
        aria-atomic="true"
      ></div>
    </section>

    <div id="authLoggedOutPanel">
      <div class="help">
        Sign in with the same <strong>email and password</strong> as the AI Spanish web app.
        This loads lesson 1 into the sheet and enables audio in the sidebar after sign-in.
      </div>
      <form id="loadForm" action="javascript:void(0)">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="username"
          required
        />
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />
        <button type="submit" id="loadBtn">Sign in & load lesson</button>
      </form>
    </div>

    <div id="authLoggedInPanel" style="display: none">
      <div class="help">
        Use <strong>Verify audio</strong> to check clips against web audio (needs local Next + tunnel; see README).
      </div>
      <div class="auth-actions">
        <button type="button" id="reloadBtnSignedIn">Load lesson from web</button>
        <button type="button" id="verifyBtnSignedIn">Verify audio</button>
        <button type="button" id="logoutBtn">Log out</button>
      </div>
    </div>

    <div id="status" aria-live="polite"></div>

    <script>
      var PREVIEW_POLL_MS = 750;
      var ACCESS_EXPIRY_BUFFER_MS = 120000;
      var REFRESH_TICK_MS = 60000;
      var lastPreviewKey = "";

      var verifyGeneration = 0;
      var verificationAnyPhraseFail = false;

      var sessionAccessToken = null;
      var refreshToken = null;
      var accessExpiresAtMs = 0;
      var phraseDirectory = [];
      var transcriptLessonId = "1";
      var lastPreviewData = null;
      var sharedAudio = null;
      var playSessionBusy = false;
      var recordSessionBusy = false;
      var PLAY_LABEL = "Play";
      var RECORD_LABEL = "Save";
      var silentRefreshPending = false;
      var NO_AUDIO_HEARD = "No audio";

      function isLoggedIn() {
        return (
          sessionAccessToken != null &&
          sessionAccessToken !== "" &&
          refreshToken != null &&
          refreshToken !== ""
        );
      }

      function needsAccessRefresh() {
        if (!isLoggedIn()) return false;
        if (!accessExpiresAtMs) return true;
        return Date.now() > accessExpiresAtMs - ACCESS_EXPIRY_BUFFER_MS;
      }

      function applyAuthUiState() {
        var outPanel = document.getElementById("authLoggedOutPanel");
        var inPanel = document.getElementById("authLoggedInPanel");
        var preview = document.getElementById("previewSection");

        if (isLoggedIn()) {
          outPanel.style.display = "none";
          inPanel.style.display = "block";
          preview.style.display = "block";
        } else {
          outPanel.style.display = "block";
          inPanel.style.display = "none";
          preview.style.display = "none";
        }
        syncVerifyButtonEnabled();
      }

      function setAccessExpiryFromSeconds(expiresIn) {
        var sec =
          typeof expiresIn === "number" && !isNaN(expiresIn)
            ? expiresIn
            : 3600;
        accessExpiresAtMs = Date.now() + sec * 1000;
      }

      function setSessionFromPasswordResult(result) {
        if (typeof result.access_token === "string" && result.access_token) {
          sessionAccessToken = result.access_token;
        }
        if (typeof result.refresh_token === "string" && result.refresh_token) {
          refreshToken = result.refresh_token;
        }
        if (typeof result.expires_in === "number" && !isNaN(result.expires_in)) {
          setAccessExpiryFromSeconds(result.expires_in);
        } else {
          setAccessExpiryFromSeconds(3600);
        }
        if (Array.isArray(result.phraseDirectory)) {
          phraseDirectory = result.phraseDirectory;
        }
        if (
          typeof result.transcriptLessonId === "string" &&
          result.transcriptLessonId
        ) {
          transcriptLessonId = result.transcriptLessonId;
        }
        applyAuthUiState();
        syncPlayButtonsState();
      }

      function setSessionFromRefreshResult(result) {
        if (typeof result.access_token === "string" && result.access_token) {
          sessionAccessToken = result.access_token;
        }
        if (typeof result.refresh_token === "string" && result.refresh_token) {
          refreshToken = result.refresh_token;
        }
        if (typeof result.expires_in === "number" && !isNaN(result.expires_in)) {
          setAccessExpiryFromSeconds(result.expires_in);
        } else {
          setAccessExpiryFromSeconds(3600);
        }
        applyAuthUiState();
        syncPlayButtonsState();
      }

      function clearSession(reasonMsg) {
        sessionAccessToken = null;
        refreshToken = null;
        accessExpiresAtMs = 0;
        phraseDirectory = [];
        lastPreviewKey = "";
        lastPreviewData = null;
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
        document.getElementById("previewRowMeta").textContent = "Row —";
        document.getElementById("previewFirstIntro").textContent = "—";
        document.getElementById("previewSecondIntro").textContent = "—";
        document.getElementById("previewAnswer").textContent = "—";
        clearVerificationHeardHints();
        applyAuthUiState();
        syncPlayButtonsState();
        if (reasonMsg) {
          setStatus(reasonMsg, "err");
        }
      }

      function setStatus(text, variant) {
        var el = document.getElementById("status");
        el.textContent = text;
        el.className = variant || "";
      }

      function setSignInLoading(isLoading) {
        document.getElementById("loadBtn").disabled = isLoading;
      }

      function setReloadLoading(isLoading) {
        document.getElementById("reloadBtnSignedIn").disabled = isLoading;
        syncVerifyButtonEnabled();
      }

      function setVerifyLoading(isLoading) {
        var vbtn = document.getElementById("verifyBtnSignedIn");
        if (vbtn) {
          vbtn.disabled = isLoading;
          vbtn.textContent = isLoading ? "Verifying…" : "Verify audio";
        }
        document.getElementById("reloadBtnSignedIn").disabled = isLoading;
        if (!isLoading) {
          syncVerifyButtonEnabled();
        }
      }

      /** Enable Verify only when signed in with a loaded phrase directory. */
      function syncVerifyButtonEnabled() {
        var vbtn = document.getElementById("verifyBtnSignedIn");
        if (!vbtn) return;
        if (vbtn.textContent === "Verifying…") {
          return;
        }
        if (!isLoggedIn() || !phraseDirectory || phraseDirectory.length === 0) {
          vbtn.disabled = true;
        } else {
          vbtn.disabled = false;
        }
      }

      function clearVerificationHeardHints() {
        ["previewHeardFirstIntro", "previewHeardSecondIntro", "previewHeardAnswer"].forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          el.textContent = "";
          el.style.display = "none";
        });
      }

      /** Show sheet-sourced heard text under Correct line; hide when empty. */
      function setPreviewHeardField(id, raw) {
        var el = document.getElementById(id);
        if (!el) return;
        var t = raw != null ? String(raw).trim() : "";
        if (t.length > 0) {
          el.textContent = t;
          el.style.display = "block";
        } else {
          el.textContent = "";
          el.style.display = "none";
        }
      }

      /** @param {unknown[]} clips */
      function applyVerificationHeardHints(clips) {
        clearVerificationHeardHints();
        if (!Array.isArray(clips)) return;
        var i;
        for (i = 0; i < clips.length; i++) {
          /** @type {{ ok?: unknown, transcript?: unknown, id?: unknown }} */
          var clip = clips[i];
          if (!clip || clip.ok === true) continue;
          var trimmed =
            typeof clip.transcript === "string" ? clip.transcript.trim() : "";
          var t = trimmed.length > 0 ? trimmed : NO_AUDIO_HEARD;
          var idStr = clip.id != null ? String(clip.id) : "";
          var elId = "";
          if (idStr.endsWith("-first-intro")) {
            elId = "previewHeardFirstIntro";
          } else if (idStr.endsWith("-second-intro")) {
            elId = "previewHeardSecondIntro";
          } else if (idStr.endsWith("-answer")) {
            elId = "previewHeardAnswer";
          }
          var el = elId ? document.getElementById(elId) : null;
          if (el) {
            el.textContent = t;
            el.style.display = "block";
          }
        }
      }

      function findPhraseIndex(name) {
        var t = typeof name === "string" ? name.trim() : "";
        if (!t || !phraseDirectory || phraseDirectory.length === 0) {
          return null;
        }
        var i;
        for (i = 0; i < phraseDirectory.length; i++) {
          if (phraseDirectory[i].name === t) {
            return phraseDirectory[i].index;
          }
        }
        return null;
      }

      function canPlayCurrentRow() {
        return (
          isLoggedIn() &&
          lastPreviewData != null &&
          lastPreviewData.row > 0 &&
          findPhraseIndex(lastPreviewData.phraseName) !== null
        );
      }

      function canRecordSegment(segment) {
        if (!lastPreviewData) return false;
        var s =
          segment === "first-intro"
            ? lastPreviewData.firstIntro
            : segment === "second-intro"
              ? lastPreviewData.secondIntro
              : segment === "answer"
                ? lastPreviewData.answer
                : "";
        return String(s || "").trim().length > 0;
      }

      function syncPlayButtonsState() {
        var playBtns = document.querySelectorAll(".preview-play");
        var recordBtns = document.querySelectorAll(".preview-record");
        var i;

        if (playSessionBusy || recordSessionBusy) {
          for (i = 0; i < playBtns.length; i++) {
            playBtns[i].disabled = true;
          }
          for (i = 0; i < recordBtns.length; i++) {
            recordBtns[i].disabled = true;
          }
          return;
        }

        var canPlay = canPlayCurrentRow();
        for (i = 0; i < playBtns.length; i++) {
          playBtns[i].disabled = !canPlay;
          playBtns[i].innerHTML = PLAY_LABEL;
          playBtns[i].removeAttribute("aria-busy");
        }
        for (i = 0; i < recordBtns.length; i++) {
          var seg = recordBtns[i].getAttribute("data-segment");
          recordBtns[i].disabled = !canPlay || !seg || !canRecordSegment(seg);
          recordBtns[i].textContent = RECORD_LABEL;
          recordBtns[i].removeAttribute("aria-busy");
        }
      }

      function finishRecordSession() {
        hideSaveProgressPanel();
        recordSessionBusy = false;
        syncPlayButtonsState();
      }

      function hideSaveProgressPanel() {
        var el = document.getElementById("saveProgressStatus");
        if (!el) {
          return;
        }
        el.textContent = "";
        el.classList.add("save-progress--hidden");
      }

      function setRecordButtonLoading(btn) {
        btn.textContent = "Saving…";
        btn.setAttribute("aria-busy", "true");
      }

      function finishPlaySession() {
        playSessionBusy = false;
        if (sharedAudio) {
          sharedAudio.onended = null;
          sharedAudio.onerror = null;
          try {
            sharedAudio.pause();
          } catch (e) {}
        }
        syncPlayButtonsState();
      }

      function setPlayButtonLoading(btn) {
        btn.innerHTML =
          '<span class="play-spin" aria-hidden="true"></span> Loading…';
        btn.setAttribute("aria-busy", "true");
      }

      function setPlayButtonPlaying(btn) {
        btn.innerHTML = "Playing…";
        btn.setAttribute("aria-busy", "true");
      }

      function ensureAccessTokenFresh(done) {
        if (!isLoggedIn()) {
          done(false);
          return;
        }
        if (!needsAccessRefresh()) {
          done(true);
          return;
        }
        google.script.run
          .withSuccessHandler(function (r) {
            if (r && r.ok) {
              setSessionFromRefreshResult(r);
              done(true);
            } else {
              done(false);
            }
          })
          .withFailureHandler(function () {
            done(false);
          })
          .refreshSupabaseAccessToken(refreshToken);
      }

      function trySilentRefreshTick() {
        if (!isLoggedIn() || !needsAccessRefresh() || silentRefreshPending) {
          return;
        }
        silentRefreshPending = true;
        ensureAccessTokenFresh(function (ok) {
          silentRefreshPending = false;
          if (!ok) {
            clearSession("Session expired. Sign in again.");
          }
        });
      }

      function runPresignRound(btn, segment, phraseName, round) {
        google.script.run
          .withSuccessHandler(function (res) {
            if (res && res.unauthorized && refreshToken && round === 0) {
              google.script.run
                .withSuccessHandler(function (ref) {
                  if (ref && ref.ok) {
                    setSessionFromRefreshResult(ref);
                    runPresignRound(btn, segment, phraseName, 1);
                  } else {
                    clearSession("Session expired. Sign in again.");
                    finishPlaySession();
                  }
                })
                .withFailureHandler(function () {
                  clearSession("Session expired. Sign in again.");
                  finishPlaySession();
                })
                .refreshSupabaseAccessToken(refreshToken);
              return;
            }

            if (res && res.ok && res.url) {
              if (!sharedAudio) {
                sharedAudio = new Audio();
              }
              sharedAudio.pause();
              sharedAudio.src = res.url;

              sharedAudio.onended = function () {
                finishPlaySession();
              };
              sharedAudio.onerror = function () {
                setStatus("Audio failed to load or play.", "err");
                finishPlaySession();
              };

              setPlayButtonPlaying(btn);

              sharedAudio.play().catch(function () {
                setStatus("Playback failed.", "err");
                finishPlaySession();
              });
            } else {
              setStatus((res && res.message) || "Could not get audio URL.", "err");
              finishPlaySession();
            }
          })
          .withFailureHandler(function (err) {
            setStatus(err.message || String(err), "err");
            finishPlaySession();
          })
          .getPresignedMp3Url(
            sessionAccessToken,
            phraseName,
            segment,
            transcriptLessonId
          );
      }

      function playSegment(segment, btn) {
        if (!lastPreviewData || !isLoggedIn()) {
          return;
        }
        if (findPhraseIndex(lastPreviewData.phraseName) === null) {
          setStatus(
            "This row’s phrase name is not in the loaded lesson. Reload lesson if you changed the sheet.",
            "err"
          );
          return;
        }
        var phraseName = lastPreviewData.phraseName;

        playSessionBusy = true;

        var all = document.querySelectorAll(".preview-play");
        var k;
        for (k = 0; k < all.length; k++) {
          all[k].disabled = true;
        }
        setPlayButtonLoading(btn);

        ensureAccessTokenFresh(function (ok) {
          if (!ok) {
            clearSession("Session expired. Sign in again.");
            finishPlaySession();
            return;
          }
          runPresignRound(btn, segment, phraseName, 0);
        });
      }

      var SAVE_PROGRESS_STEPS = [
        "Name check",
        "Synthesize & upload",
        "Loudness and transcribe check",
        "Saving",
      ];

      /** @param {number} activeStepIndex */
      function setSaveProgressActive(activeStepIndex) {
        var el = document.getElementById("saveProgressStatus");
        if (!el) {
          return;
        }
        el.classList.remove("save-progress--hidden");
        var lines = ["Saving…"];
        var i;
        for (i = 0; i < SAVE_PROGRESS_STEPS.length; i++) {
          if (i < activeStepIndex) {
            lines.push("✓ " + SAVE_PROGRESS_STEPS[i]);
          } else if (i === activeStepIndex) {
            lines.push("→ " + SAVE_PROGRESS_STEPS[i] + "…");
          } else {
            lines.push("  " + SAVE_PROGRESS_STEPS[i]);
          }
        }
        el.textContent = lines.join("\n");
      }

      function segmentTextBodyForSave(segment, fi, si, an) {
        var f = fi != null ? String(fi) : "";
        var s = si != null ? String(si) : "";
        var a = an != null ? String(an) : "";
        if (segment === "second-intro") {
          return s;
        }
        if (segment === "answer") {
          return a;
        }
        return f;
      }

      /**
       * @param {unknown} res
       * @param {number} authRound
       * @param {function(): void} retryFn
       */
      function saveFlowMaybeRefreshAuth(res, authRound, retryFn) {
        if (
          res &&
          /** @type {{ unauthorized?: unknown }} */ (res).unauthorized &&
          refreshToken &&
          authRound === 0
        ) {
          google.script.run
            .withSuccessHandler(function (ref) {
              if (ref && ref.ok) {
                setSessionFromRefreshResult(ref);
                retryFn();
              } else {
                clearSession("Session expired. Sign in again.");
                finishRecordSession();
              }
            })
            .withFailureHandler(function () {
              clearSession("Session expired. Sign in again.");
              finishRecordSession();
            })
            .refreshSupabaseAccessToken(refreshToken);
          return true;
        }
        return false;
      }

      function refreshPreviewAfterSave() {
        google.script.run
          .withSuccessHandler(displayPreview)
          .withFailureHandler(function () {})
          .getActiveRowPhrasePreview();
      }

      /**
       * @param {string} phase focus | preflight | synth | verify | merge
       * @param {unknown[]=} clipsForMergeFailure
       */
      function runSaveChain(
        btn,
        segment,
        phraseName,
        phraseIdx,
        authRound,
        phase,
        fi,
        si,
        an,
        clipsForMergeFailure
      ) {
        var textBody = segmentTextBodyForSave(segment, fi, si, an);
        var nameTrim =
          typeof phraseName === "string" ? phraseName.trim() : "";

        if (phase === "focus") {
          setSaveProgressActive(0);
          google.script.run
            .withSuccessHandler(function () {
              runSaveChain(
                btn,
                segment,
                phraseName,
                phraseIdx,
                authRound,
                "preflight",
                fi,
                si,
                an,
                clipsForMergeFailure
              );
            })
            .withFailureHandler(function (err) {
              finishRecordSession();
              setStatus(err.message || String(err), "err");
            })
            .focusLessonRowForPhraseIndex(phraseDirectory, phraseIdx);
          return;
        }

        if (phase === "preflight") {
          setSaveProgressActive(0);
          google.script.run
            .withSuccessHandler(function (res) {
              if (
                saveFlowMaybeRefreshAuth(res, authRound, function () {
                  runSaveChain(
                    btn,
                    segment,
                    phraseName,
                    phraseIdx,
                    1,
                    "preflight",
                    fi,
                    si,
                    an,
                    clipsForMergeFailure
                  );
                })
              ) {
                return;
              }
              if (!res || res.ok !== true) {
                finishRecordSession();
                clearVerificationHeardHints();
                setStatus((res && res.message) || "Preflight failed.", "err");
                refreshPreviewAfterSave();
                return;
              }
              runSaveChain(
                btn,
                segment,
                phraseName,
                phraseIdx,
                authRound,
                "synth",
                fi,
                si,
                an,
                clipsForMergeFailure
              );
            })
            .withFailureHandler(function (err) {
              finishRecordSession();
              setStatus(err.message || String(err), "err");
            })
            .recordPhraseSavePreflight(sessionAccessToken, transcriptLessonId);
          return;
        }

        if (phase === "synth") {
          setSaveProgressActive(1);
          google.script.run
            .withSuccessHandler(function (res) {
              if (
                saveFlowMaybeRefreshAuth(res, authRound, function () {
                  runSaveChain(
                    btn,
                    segment,
                    phraseName,
                    phraseIdx,
                    1,
                    "synth",
                    fi,
                    si,
                    an,
                    clipsForMergeFailure
                  );
                })
              ) {
                return;
              }
              if (res && res.synthDisabled) {
                finishRecordSession();
                clearVerificationHeardHints();
                setStatus(
                  res.message ||
                    "Synthesis not enabled (ENABLE_LESSON_AUDIO_SYNTHESIZE).",
                  "err"
                );
                refreshPreviewAfterSave();
                return;
              }
              if (!res || res.ok !== true) {
                finishRecordSession();
                clearVerificationHeardHints();
                setStatus((res && res.message) || "Synthesis failed.", "err");
                refreshPreviewAfterSave();
                return;
              }
              runSaveChain(
                btn,
                segment,
                phraseName,
                phraseIdx,
                authRound,
                "verify",
                fi,
                si,
                an,
                clipsForMergeFailure
              );
            })
            .withFailureHandler(function (err) {
              finishRecordSession();
              setStatus(err.message || String(err), "err");
            })
            .lessonAudioSynthesize(
              sessionAccessToken,
              transcriptLessonId,
              nameTrim,
              segment,
              textBody
            );
          return;
        }

        if (phase === "verify") {
          setSaveProgressActive(2);
          /** @type {Record<string, string>} */
          var overrides = {};
          overrides[nameTrim + "-" + segment] = textBody;
          google.script.run
            .withSuccessHandler(function (res) {
              if (
                saveFlowMaybeRefreshAuth(res, authRound, function () {
                  runSaveChain(
                    btn,
                    segment,
                    phraseName,
                    phraseIdx,
                    1,
                    "verify",
                    fi,
                    si,
                    an,
                    clipsForMergeFailure
                  );
                })
              ) {
                return;
              }
              if (res && res.verifyDisabled) {
                finishRecordSession();
                clearVerificationHeardHints();
                setStatus(
                  res.message ||
                    "Verification not enabled on server (ENABLE_LESSON_AUDIO_VERIFY).",
                  "err"
                );
                refreshPreviewAfterSave();
                return;
              }
              if (!res || res.ok !== true) {
                finishRecordSession();
                clearVerificationHeardHints();
                setStatus((res && res.message) || "Verification failed.", "err");
                refreshPreviewAfterSave();
                return;
              }
              /** @type {{ verified?: unknown, clips?: unknown[], message?: string }} */
              var vr = res;
              if (vr.verified === true) {
                runSaveChain(
                  btn,
                  segment,
                  phraseName,
                  phraseIdx,
                  authRound,
                  "merge",
                  fi,
                  si,
                  an,
                  vr.clips || []
                );
                return;
              }
              finishRecordSession();
              applyVerificationHeardHints(vr.clips || []);
              setStatus(
                vr.message || "Saved; clip failed verification.",
                "err"
              );
              refreshPreviewAfterSave();
            })
            .withFailureHandler(function (err) {
              finishRecordSession();
              setStatus(err.message || String(err), "err");
            })
            .verifyLessonAudioPhrase(
              sessionAccessToken,
              transcriptLessonId,
              phraseDirectory,
              phraseIdx,
              overrides,
              [segment]
            );
          return;
        }

        if (phase === "merge") {
          setSaveProgressActive(3);
          var clipsHint =
            clipsForMergeFailure instanceof Array ? clipsForMergeFailure : [];
          google.script.run
            .withSuccessHandler(function (res) {
              if (
                saveFlowMaybeRefreshAuth(res, authRound, function () {
                  runSaveChain(
                    btn,
                    segment,
                    phraseName,
                    phraseIdx,
                    1,
                    "merge",
                    fi,
                    si,
                    an,
                    clipsHint
                  );
                })
              ) {
                return;
              }
              finishRecordSession();
              if (!res || res.ok !== true) {
                applyVerificationHeardHints(clipsHint);
                setStatus(
                  (res && res.message) || "Verified but transcript merge failed.",
                  "err"
                );
                refreshPreviewAfterSave();
                return;
              }
              applyVerificationHeardHints([]);
              setStatus("Saved, verified, and transcript saved.", "ok");
              refreshPreviewAfterSave();
            })
            .withFailureHandler(function (err) {
              finishRecordSession();
              setStatus(err.message || String(err), "err");
            })
            .mergeTranscriptSegment(
              sessionAccessToken,
              transcriptLessonId,
              phraseIdx,
              segment,
              textBody
            );
        }
      }

      function recordSegment(segment, btn) {
        if (!lastPreviewData || !isLoggedIn()) {
          return;
        }
        var phraseIdx = findPhraseIndex(lastPreviewData.phraseName);
        if (phraseIdx === null) {
          setStatus(
            "This row’s phrase name is not in the loaded lesson. Reload lesson if you changed the sheet.",
            "err"
          );
          return;
        }
        if (!canRecordSegment(segment)) {
          setStatus("Add non-empty text to this column before saving.", "err");
          return;
        }
        var phraseName = lastPreviewData.phraseName;
        var fi = lastPreviewData ? lastPreviewData.firstIntro : "";
        var si = lastPreviewData ? lastPreviewData.secondIntro : "";
        var an = lastPreviewData ? lastPreviewData.answer : "";

        recordSessionBusy = true;
        var pb = document.querySelectorAll(".preview-play");
        var rb = document.querySelectorAll(".preview-record");
        var k;
        for (k = 0; k < pb.length; k++) {
          pb[k].disabled = true;
        }
        for (k = 0; k < rb.length; k++) {
          rb[k].disabled = true;
        }
        setRecordButtonLoading(btn);

        ensureAccessTokenFresh(function (tokOk) {
          if (!tokOk) {
            clearSession("Session expired. Sign in again.");
            finishRecordSession();
            return;
          }
          runSaveChain(btn, segment, phraseName, phraseIdx, 0, "focus", fi, si, an, []);
        });
      }

      /** @param {number} retryRound oauth refresh recursion (0 = first, 1 = after token refresh) */
      function runLessonVerifyWhole(retryRound) {
        if (!isLoggedIn()) {
          return;
        }
        if (!phraseDirectory || phraseDirectory.length === 0) {
          setStatus("Load a lesson first.", "err");
          return;
        }
        verifyGeneration += 1;
        var gen = verifyGeneration;
        verificationAnyPhraseFail = false;
        clearVerificationHeardHints();
        setVerifyLoading(true);
        setStatus("Verifying lesson (" + phraseDirectory.length + " phrases)…");

        ensureAccessTokenFresh(function (freshOk) {
          if (gen !== verifyGeneration) {
            return;
          }
          if (!freshOk) {
            setVerifyLoading(false);
            clearSession("Session expired. Sign in again.");
            return;
          }

          google.script.run
            .withSuccessHandler(function (vr) {
              if (gen !== verifyGeneration) {
                return;
              }
              setVerifyLoading(false);

              if (vr && vr.unauthorized && refreshToken && retryRound === 0) {
                google.script.run
                  .withSuccessHandler(function (ref) {
                    if (ref && ref.ok) {
                      setSessionFromRefreshResult(ref);
                      runLessonVerifyWhole(1);
                    } else {
                      clearSession("Session expired. Sign in again.");
                    }
                  })
                  .withFailureHandler(function () {
                    clearSession("Session expired. Sign in again.");
                  })
                  .refreshSupabaseAccessToken(refreshToken);
                return;
              }

              if (vr && vr.verifyDisabled) {
                clearVerificationHeardHints();
                setStatus(
                  vr.message ||
                    "Audio verification is not enabled on this server (set ENABLE_LESSON_AUDIO_VERIFY on local Next.js).",
                  ""
                );
                return;
              }

              if (!vr || vr.ok === false) {
                verificationAnyPhraseFail = true;
              }

              if (Array.isArray(vr && vr.phrases)) {
                var matchPhrase = vr.phrases.find(function (p) {
                  return p && !p.verified;
                });
                if (matchPhrase && Array.isArray(matchPhrase.clips)) {
                  applyVerificationHeardHints(matchPhrase.clips);
                } else {
                  clearVerificationHeardHints();
                }
              }

              google.script.run
                .withSuccessHandler(displayPreview)
                .withFailureHandler(function () {})
                .getActiveRowPhrasePreview();

              if (verificationAnyPhraseFail) {
                var s = vr && vr.summary;
                var detail = s
                  ? " (" + s.failedClips + "/" + s.totalClips + " clips failed)"
                  : "";
                setStatus("Verification finished with some failing phrases" + detail + ".", "err");
              } else {
                setStatus("Verification complete.", "ok");
              }
            })
            .withFailureHandler(function (err) {
              if (gen !== verifyGeneration) {
                return;
              }
              setVerifyLoading(false);
              clearVerificationHeardHints();
              setStatus(err.message || String(err), "err");
            })
            .verifyLessonAudio(sessionAccessToken, transcriptLessonId, phraseDirectory);
        });
      }

      function runReloadRound(retryRound) {
        setReloadLoading(true);
        ensureAccessTokenFresh(function (freshOk) {
          if (!freshOk) {
            setReloadLoading(false);
            clearSession("Session expired. Sign in again.");
            return;
          }
          google.script.run
            .withSuccessHandler(function (result) {
              setReloadLoading(false);
              if (result && result.ok) {
                if (Array.isArray(result.phraseDirectory)) {
                  phraseDirectory = result.phraseDirectory;
                }
                if (
                  typeof result.transcriptLessonId === "string" &&
                  result.transcriptLessonId
                ) {
                  transcriptLessonId = result.transcriptLessonId;
                }
                setStatus(result.message || "Done.", "ok");
                clearVerificationHeardHints();
                syncPlayButtonsState();
                syncVerifyButtonEnabled();
                return;
              }
              if (
                result &&
                result.unauthorized &&
                refreshToken &&
                retryRound === 0
              ) {
                google.script.run
                  .withSuccessHandler(function (ref) {
                    if (ref && ref.ok) {
                      setSessionFromRefreshResult(ref);
                      runReloadRound(1);
                    } else {
                      clearSession("Session expired. Sign in again.");
                    }
                  })
                  .withFailureHandler(function () {
                    clearSession("Session expired. Sign in again.");
                  })
                  .refreshSupabaseAccessToken(refreshToken);
                return;
              }
              setStatus((result && result.message) || "Something went wrong.", "err");
            })
            .withFailureHandler(function (err) {
              setReloadLoading(false);
              setStatus(err.message || String(err), "err");
            })
            .reloadLessonWithAccessToken(sessionAccessToken);
        });
      }

      function displayPreview(data) {
        if (!data) return;
        if (!isLoggedIn()) return;

        var key =
          data.row +
          "\0" +
          (data.phraseName || "") +
          "\0" +
          data.firstIntro +
          "\0" +
          data.secondIntro +
          "\0" +
          data.answer +
          "\0" +
          (data.firstIntroHeard != null ? String(data.firstIntroHeard) : "") +
          "\0" +
          (data.secondIntroHeard != null ? String(data.secondIntroHeard) : "") +
          "\0" +
          (data.answerHeard != null ? String(data.answerHeard) : "");
        if (key === lastPreviewKey) {
          return;
        }
        lastPreviewKey = key;

        lastPreviewData = data;

        var rowEl = document.getElementById("previewRowMeta");
        if (data.row > 0) {
          rowEl.textContent = "Row " + data.row;
        } else {
          rowEl.textContent = "No selection";
        }

        function orDash(s) {
          return s != null && String(s).length > 0 ? String(s) : "—";
        }

        document.getElementById("previewFirstIntro").textContent = orDash(
          data.firstIntro
        );
        document.getElementById("previewSecondIntro").textContent = orDash(
          data.secondIntro
        );
        document.getElementById("previewAnswer").textContent = orDash(data.answer);

        setPreviewHeardField(
          "previewHeardFirstIntro",
          data.firstIntroHeard !== undefined ? data.firstIntroHeard : ""
        );
        setPreviewHeardField(
          "previewHeardSecondIntro",
          data.secondIntroHeard !== undefined ? data.secondIntroHeard : ""
        );
        setPreviewHeardField(
          "previewHeardAnswer",
          data.answerHeard !== undefined ? data.answerHeard : ""
        );

        syncPlayButtonsState();
      }

      function refreshRowPreview() {
        if (!isLoggedIn()) return;
        google.script.run
          .withSuccessHandler(displayPreview)
          .withFailureHandler(function () {})
          .getActiveRowPhrasePreview();
      }

      setInterval(refreshRowPreview, PREVIEW_POLL_MS);
      setInterval(trySilentRefreshTick, REFRESH_TICK_MS);

      var playButtons = document.querySelectorAll(".preview-play");
      var j;
      for (j = 0; j < playButtons.length; j++) {
        playButtons[j].addEventListener("click", function (ev) {
          var seg = ev.currentTarget.getAttribute("data-segment");
          if (seg) playSegment(seg, ev.currentTarget);
        });
      }

      var recordButtons = document.querySelectorAll(".preview-record");
      for (j = 0; j < recordButtons.length; j++) {
        recordButtons[j].addEventListener("click", function (ev) {
          var segR = ev.currentTarget.getAttribute("data-segment");
          if (segR) recordSegment(segR, ev.currentTarget);
        });
      }

      document.getElementById("loadForm").addEventListener("submit", function (ev) {
        ev.preventDefault();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        if (!email) {
          setStatus("Enter your email.", "err");
          return;
        }
        setStatus("Loading…");
        setSignInLoading(true);
        google.script.run
          .withSuccessHandler(function (result) {
            setSignInLoading(false);
            if (result && result.ok) {
              setSessionFromPasswordResult(result);
              setStatus(result.message || "Done.", "ok");
              refreshRowPreview();
            } else {
              setStatus((result && result.message) || "Something went wrong.", "err");
            }
          })
          .withFailureHandler(function (err) {
            setSignInLoading(false);
            setStatus(err.message || String(err), "err");
          })
          .populateLessonFromJson(email, password);
      });

      document.getElementById("logoutBtn").addEventListener("click", function () {
        clearSession();
        setStatus("Signed out.", "ok");
      });

      document
        .getElementById("reloadBtnSignedIn")
        .addEventListener("click", function () {
          if (!isLoggedIn()) return;
          setStatus("Loading…");
          runReloadRound(0);
        });

      document
        .getElementById("verifyBtnSignedIn")
        .addEventListener("click", function () {
          if (!isLoggedIn() || !phraseDirectory || phraseDirectory.length === 0) {
            setStatus("Load a lesson first.", "err");
            return;
          }
          runLessonVerifyWhole(0);
        });

      applyAuthUiState();
      syncPlayButtonsState();
    </script>
  </body>
</html>
